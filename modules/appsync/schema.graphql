type Zone @aws_iam @aws_cognito_user_pools {
  zoneId: ID!
  crowdCount: Int!
  capacity: Int
  status: String
  action: String
  lastUpdated: String
}

type Query {
  getZone(zoneId: ID!): Zone @aws_cognito_user_pools
  listZones: [Zone] @aws_cognito_user_pools
}

type Mutation {
  updateZone(
    zoneId: ID!,
    crowdCount: Int!,
    capacity: Int,
    status: String,
    action: String,
    lastUpdated: String
  ): Zone
  @aws_iam
}

type Subscription {
  onUpdateZone: Zone
    @aws_subscribe(mutations: ["updateZone"])
    @aws_cognito_user_pools
}

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}
