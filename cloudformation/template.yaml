AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CrowdSync Infrastructure using AWS SAM and CloudFormation

Parameters:
  ProjectName:
    Type: String
    Default: crowd-monitoring
  Environment:
    Type: String
    Default: dev
  WebAclArn:
    Type: String
    Default: ""
    Description: Regional WAF ARN for API Gateway (Optional)

Globals:
  Function:
    Runtime: python3.9
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        PROJECT_NAME: !Ref ProjectName
        ENVIRONMENT: !Ref Environment

Conditions:
  HasWebAcl: !Not [ !Equals [ !Ref WebAclArn, "" ] ]

Resources:
  # ==========================================
  # DynamoDB
  # ==========================================
  ZonesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-zones-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: zoneId
          AttributeType: S
      KeySchema:
        - AttributeName: zoneId
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  MetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-metadata-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: zoneId
          AttributeType: S
      KeySchema:
        - AttributeName: zoneId
          KeyType: HASH

  # ==========================================
  # SQS
  # ==========================================
  TelemetryDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-telemetry-dlq-${Environment}"
      MessageRetentionPeriod: 1209600

  TelemetryQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-telemetry-queue-${Environment}"
      MessageRetentionPeriod: 86400
      ReceiveMessageWaitTimeSeconds: 10
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TelemetryDLQ.Arn
        maxReceiveCount: 3

  # ==========================================
  # SNS
  # ==========================================
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-alerts-${Environment}"

  # ==========================================
  # S3 (Data Lake & Frontend)
  # ==========================================
  AnalyticsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-analytics-${Environment}-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: MoveToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
          - Id: MoveToGlacier
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: GLACIER_IR

  # ==========================================
  # S3 (Frontend)
  # ==========================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-frontend-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ==========================================
  # SSM Parameter
  # ==========================================
  IngestToken:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${ProjectName}/${Environment}/ingest_token"
      Type: String
      Value: "replace-me-with-a-secure-random-string"
      Description: "Security token for crowd data ingestion"

  # ==========================================
  # Cognito
  # ==========================================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-user-pool-${Environment}"
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-client-${Environment}"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - "http://localhost:3000"
        - "http://localhost:5173"
      LogoutURLs:
        - "http://localhost:3000"
        - "http://localhost:5173"
      PreventUserExistenceErrors: ENABLED

  # ==========================================
  # IAM Roles
  # ==========================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaCorePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt ZonesTable.Arn
                  - !GetAtt MetadataTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:ListStreams
                Resource: !GetAtt ZonesTable.StreamArn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt TelemetryQueue.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AlertsTopic
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${IngestToken}"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt AnalyticsBucket.Arn
                  - !Sub "${AnalyticsBucket.Arn}/*"
                  - !GetAtt FrontendBucket.Arn
                  - !Sub "${FrontendBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - appsync:GraphQL
                Resource: !Sub "${AppSyncApi.Arn}/*"

  ApiGatewaySqsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiGatewaySqsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt TelemetryQueue.Arn

  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AppSyncLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt ZonesTable.Arn
                  - !GetAtt MetadataTable.Arn

  # ==========================================
  # AppSync API
  # ==========================================
  AppSyncApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: !Sub "${ProjectName}-api-${Environment}"
      AuthenticationType: AMAZON_COGNITO_USER_POOLS
      UserPoolConfig:
        UserPoolId: !Ref UserPool
        AwsRegion: !Ref AWS::Region
        DefaultAction: ALLOW
      AdditionalAuthenticationProviders:
        - AuthenticationType: AWS_IAM

  AppSyncSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      Definition: |
        type Zone @aws_iam @aws_cognito_user_pools {
          zoneId: ID!
          crowdCount: Int!
          capacity: Int
          status: String
          action: String
          predictedAction: String
          lastUpdated: String
        }

        type Query @aws_iam @aws_cognito_user_pools {
          getZone(zoneId: ID!): Zone
          listZones: [Zone]
        }

        type Mutation @aws_iam @aws_cognito_user_pools {
          updateZone(zoneId: ID!, crowdCount: Int!, capacity: Int, status: String, action: String, predictedAction: String, lastUpdated: String): Zone
            @aws_iam @aws_cognito_user_pools
        }

        type Subscription @aws_iam @aws_cognito_user_pools {
          onUpdateZone: Zone
            @aws_subscribe(mutations: ["updateZone"])
        }

        schema {
          query: Query
          mutation: Mutation
          subscription: Subscription
        }

  # Data Sources
  ZonesDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      Name: ZonesTable
      Type: AMAZON_DYNAMODB
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn
      DynamoDBConfig:
        TableName: !Ref ZonesTable
        AwsRegion: !Ref AWS::Region

  NoneDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      Name: NoneDataSource
      Type: NONE

  # Resolvers
  ListZonesResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Query
      FieldName: listZones
      DataSourceName: !GetAtt ZonesDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "Scan"
        }
      ResponseMappingTemplate: "$util.toJson($context.result.items)"

  UpdateZoneResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Mutation
      FieldName: updateZone
      DataSourceName: !GetAtt NoneDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "payload": $util.toJson($ctx.args)
        }
      ResponseMappingTemplate: "$util.toJson($context.result)"

  # ==========================================
  # Lambda Functions
  # ==========================================
  IngestHandler:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_src/
      Handler: ingest_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref ZonesTable
          METADATA_TABLE: !Ref MetadataTable
          BUCKET_NAME: !Ref AnalyticsBucket
          TOPIC_ARN: !Ref AlertsTopic
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt TelemetryQueue.Arn
            BatchSize: 10

  ReadHandler:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_src/
      Handler: read_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref ZonesTable

  AuthorizerHandler:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_src/
      Handler: authorizer_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TOKEN_PARAM_NAME: !Ref IngestToken

  NotifierHandler:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda_src/
      Handler: realtime_notifier.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          APPSYNC_URL: !GetAtt AppSyncApi.GraphQLUrl
      Events:
        DynamoDBEvent:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt ZonesTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10

  # ==========================================
  # API Gateway v2
  # ==========================================
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ProjectName}-api-${Environment}"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - "POST"
          - "OPTIONS"
        AllowHeaders:
          - "content-type"
          - "x-api-token"
        MaxAge: 300

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  LambdaAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      AuthorizerType: REQUEST
      AuthorizerUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthorizerHandler.Arn}/invocations"
      IdentitySource:
        - "$request.header.x-api-token"
      Name: token-authorizer
      AuthorizerPayloadFormatVersion: "2.0"
      EnableSimpleResponses: true

  AuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AuthorizerHandler
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  SqsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationSubtype: SQS-SendMessage
      CredentialsArn: !GetAtt ApiGatewaySqsRole.Arn
      PayloadFormatVersion: "1.0"
      RequestParameters:
        "QueueUrl": !Ref TelemetryQueue
        "MessageBody": "$request.body"

  PostDataRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /crowd-data"
      Target: !Sub "integrations/${SqsIntegration}"
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref LambdaAuthorizer

  HttpApiWafAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Condition: HasWebAcl
    Properties:
      ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/apis/${HttpApi}/stages/$default"
      WebACLArn: !Ref WebAclArn

  # ==========================================
  # CloudFront
  # ==========================================
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac-${Environment}"
        Description: "OAC for frontend"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: CloudFrontOAC
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: !Sub "${ProjectName}-frontend-${Environment}"
        PriceClass: PriceClass_100
        Origins:
          - DomainName: !GetAtt FrontendBucket.RegionalDomainName
            Id: !Sub "S3-${FrontendBucket}"
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: !Sub "S3-${FrontendBucket}"
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  # ==========================================
  # CloudWatch Monitoring
  # ==========================================
  MissionControlDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${ProjectName}-dashboard-${Environment}"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/SQS", "NumberOfMessagesReceived", "QueueName", "${TelemetryQueue.QueueName}" ]
                ],
                "period": 60,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Incoming Telemetry (SQS)"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${IngestHandler}" ]
                ],
                "period": 60,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "AI Engine Invocations"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Duration", "FunctionName", "${IngestHandler}" ]
                ],
                "period": 60,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Processing Latency (ms)"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Errors", "FunctionName", "${IngestHandler}" ]
                ],
                "period": 60,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "System Errors"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "${ZonesTable}" ]
                ],
                "period": 60,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Database Write Intensity"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 12, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ApiGateway", "Count", "ApiId", "${HttpApi}" ]
                ],
                "period": 60,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "API Gateway Request Count"
              }
            }
          ]
        }

Outputs:
  ApiUrl:
    Description: HTTP API Endpoint
    Value: !GetAtt HttpApi.ApiEndpoint
  AppSyncUrl:
    Description: GraphQL API URL
    Value: !GetAtt AppSyncApi.GraphQLUrl
  CloudFrontUrl:
    Description: Dashboard URL
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito Client ID
    Value: !Ref UserPoolClient
